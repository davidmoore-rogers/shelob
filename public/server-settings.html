<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelob — Server Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Server Settings</h2>
      </div>

      <div class="page-tabs" id="settings-tabs">
        <button class="page-tab active" data-tab="identification">Identification</button>
        <button class="page-tab" data-tab="ntp">Time &amp; NTP</button>
        <button class="page-tab" data-tab="certificates">Certificates</button>
        <button class="page-tab" data-tab="database">Database</button>
      </div>

      <div class="page-tab-panel active" id="tab-identification"></div>
      <div class="page-tab-panel" id="tab-ntp"></div>
      <div class="page-tab-panel" id="tab-certificates"></div>
      <div class="page-tab-panel" id="tab-database"></div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/server-settings.js"></script>
</body>
</html>

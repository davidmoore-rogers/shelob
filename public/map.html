<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polaris — Device Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="/css/vendor/leaflet/MarkerCluster.css">
  <link rel="stylesheet" href="/css/vendor/leaflet/MarkerCluster.Default.css">
  <link rel="stylesheet" href="/css/map.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Device Map</h2>
      </div>

      <div class="map-toolbar">
        <button type="button" id="map-theme-toggle" class="btn-icon map-theme-toggle" aria-label="Toggle map theme" title="Toggle map theme (saved per user)" style="line-height:0"></button>
        <div id="map-status" class="map-status"></div>
      </div>

      <div id="map" class="map-canvas"></div>
    </main>
  </div>

  <!-- Topology modal — populated by map.js on marker click -->
  <div class="modal-overlay" id="topology-overlay" aria-hidden="true">
    <div class="modal modal-xl" role="dialog" aria-modal="true" aria-labelledby="topology-title">
      <div class="modal-header">
        <h3 id="topology-title">Site topology</h3>
        <div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end">
          <div class="topology-search-wrap" style="position:relative;flex:0 1 320px;max-width:320px">
            <input
              type="search"
              id="topology-search-input"
              class="topology-search-input"
              placeholder="Find endpoint by hostname / IP / MAC / user…"
              aria-label="Search endpoints in this site"
              autocomplete="off"
              spellcheck="false"
            >
            <ul id="topology-search-results" class="topology-search-results" role="listbox" hidden></ul>
          </div>
          <button type="button" class="btn-icon" id="topology-refresh" aria-label="Refresh topology" title="Refresh topology" style="line-height:0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="23 4 23 10 17 10"/>
              <polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
          <button type="button" class="btn-icon" id="topology-fullscreen" aria-label="Toggle full screen" title="Toggle full screen (Esc to exit)" style="line-height:0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
              <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
              <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
              <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
            </svg>
          </button>
          <button type="button" class="btn-icon" id="topology-screenshot" aria-label="Copy topology as image" title="Copy topology as image" style="line-height:0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </button>
          <button type="button" class="btn-icon modal-close" id="topology-close" aria-label="Close">&times;</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="topology-layout">
          <div id="topology-graph" class="topology-graph"></div>
          <aside id="topology-info" class="topology-info"></aside>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/vendor/leaflet/leaflet.js"></script>
  <script src="/js/vendor/leaflet/leaflet.markercluster.js"></script>
  <script src="/js/vendor/cytoscape.min.js"></script>
  <script src="/js/vendor/dagre.min.js"></script>
  <script src="/js/vendor/cytoscape-dagre.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/map.js"></script>
</body>
</html>

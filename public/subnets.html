<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelob — Networks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Networks</h2>
        <div class="page-header-actions">
          <button class="btn btn-secondary" id="btn-auto-alloc" data-admin-only>Auto-Allocate Next</button>
          <button class="btn btn-primary" id="btn-add-subnet" data-admin-only>+ Add Network</button>
        </div>
      </div>

      <div class="filter-bar">
        <label>Block</label>
        <select id="filter-block" style="width:auto"><option value="">All blocks</option></select>
        <label>Status</label>
        <select id="filter-status" style="width:auto">
          <option value="hide-deprecated" selected>Available / Reserved</option>
          <option value="">All</option>
          <option value="available">Available</option>
          <option value="reserved">Reserved</option>
          <option value="deprecated">Deprecated</option>
        </select>
        <label>Tag</label>
        <input type="text" id="filter-tag" placeholder="e.g. prod" style="width:140px">
        <label style="margin-left:auto">Show</label>
        <select id="filter-pagesize" style="width:auto">
          <option value="15" selected>15</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Network</th>
              <th>Block</th>
              <th>Purpose</th>
              <th>VLAN</th>
              <th>Status</th>
              <th>Tags</th>
              <th>Server</th>
              <th>Integration</th>
              <th>Reservations</th>
              <th style="width:90px">Actions</th>
            </tr>
          </thead>
          <tbody id="subnets-tbody">
            <tr><td colspan="11" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" style="display:flex;align-items:center;gap:12px;justify-content:center;padding:1rem 0"></div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/ip-panel.js"></script>
  <script src="/js/subnets.js"></script>
</body>
</html>

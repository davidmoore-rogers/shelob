<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - IPAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Users</h2>
        <div class="page-header-actions">
          <button class="btn btn-primary" id="btn-add-user">+ Add User</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Role</th>
              <th>Created</th>
              <th style="width:220px">Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="4" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/users.js"></script>
</body>
</html>

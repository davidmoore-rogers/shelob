<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polaris — Users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Users</h2>
        <div class="page-header-actions">
          <button class="btn btn-secondary" id="btn-auth-settings" style="display:none">Authentication</button>
          <button class="btn btn-primary" id="btn-add-user">+ Add User</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:24px"></th>
              <th data-sf-key="username"        data-sf-type="string">Username</th>
              <th data-sf-key="authProvider"    data-sf-type="string">Auth</th>
              <th data-sf-key="role.name"       data-sf-type="string">Role</th>
              <th data-sf-key="totpEnabledSort" data-sf-type="string">2FA</th>
              <th data-sf-key="lastLogin"       data-sf-type="date">Last Login</th>
              <th data-sf-key="createdAt"       data-sf-type="date">Created</th>
              <th style="width:260px">Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="8" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Roles management — admins only. Lists every editable Role
           (built-ins admin + readonly are protected/locked and hidden);
           clicking a role name opens the permissions slide-over. -->
      <section id="roles-section" style="margin-top:2.5rem;display:none">
        <div class="page-header" style="margin-bottom:1rem">
          <h2 style="font-size:1.15rem;margin:0">Roles</h2>
          <div class="page-header-actions">
            <button class="btn btn-primary" id="btn-add-role">+ Add Role</button>
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Description</th>
                <th style="width:120px">Users</th>
                <th style="width:120px">Built-in</th>
                <th style="width:260px">Actions</th>
              </tr>
            </thead>
            <tbody id="roles-tbody">
              <tr><td colspan="5" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Permissions slide-over (built on first open) -->
  <div id="role-slideover-mount"></div>

  <script src="/js/table-sf.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/users.js"></script>
</body>
</html>

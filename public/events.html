<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelob — Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Events</h2>
        <div class="page-header-actions">
          <div class="btn-dropdown-wrap">
            <button class="btn btn-secondary" id="btn-export">Export &#9662;</button>
            <div class="btn-dropdown-menu" id="export-menu">
              <div class="dropdown-heading">PDF</div>
              <button data-export="page" data-fmt="pdf">Current page</button>
              <button data-export="filtered" data-fmt="pdf">All filtered results</button>
              <button data-export="all" data-fmt="pdf">Entire event log</button>
              <div class="dropdown-divider"></div>
              <div class="dropdown-heading">CSV</div>
              <button data-export="page" data-fmt="csv">Current page</button>
              <button data-export="filtered" data-fmt="csv">All filtered results</button>
              <button data-export="all" data-fmt="csv">Entire event log</button>
            </div>
          </div>
          <button class="btn btn-secondary" id="btn-conflicts" data-review-conflicts title="Review conflicts from discovery" style="position:relative">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="vertical-align:middle;margin-right:4px"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Conflicts
            <span id="conflict-badge" style="display:none;position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 4px;border-radius:99px;background:var(--color-danger);color:#fff;font-size:0.68rem;font-weight:700;line-height:18px;text-align:center"></span>
          </button>
          <button class="btn btn-secondary" id="btn-event-settings" data-admin-only title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</button>
        </div>
      </div>

      <div class="filter-bar">
        <label>Level</label>
        <select id="filter-level" style="width:auto">
          <option value="">All</option>
          <option value="info">Info</option>
          <option value="warning">Warning</option>
          <option value="error">Error</option>
        </select>
        <label>Resource</label>
        <select id="filter-resource" style="width:auto">
          <option value="">All</option>
          <option value="block">Blocks</option>
          <option value="subnet">Networks</option>
          <option value="reservation">Reservations</option>
          <option value="asset">Assets</option>
          <option value="integration">Integrations</option>
        </select>
        <label>Action</label>
        <input type="text" id="filter-action" placeholder="e.g. created, deleted, discover..." style="width:180px">
        <label>User</label>
        <input type="text" id="filter-actor" placeholder="e.g. admin" style="width:120px">
        <label style="margin-left:auto">Show</label>
        <select id="filter-pagesize" style="width:auto">
          <option value="15" selected>15</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <button class="btn btn-secondary" id="btn-refresh">Refresh</button>
      </div>

      <div id="pagination-top" style="display:flex;align-items:center;gap:12px;justify-content:center;padding:0.5rem 0 1rem"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:160px">Timestamp</th>
              <th style="width:70px">Level</th>
              <th style="width:140px">Action</th>
              <th style="width:100px">Resource</th>
              <th>Message</th>
              <th style="width:100px">User</th>
              <th style="width:60px"></th>
            </tr>
          </thead>
          <tbody id="events-tbody">
            <tr><td colspan="7" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="pagination" style="display:flex;align-items:center;gap:12px;justify-content:center;padding:1rem 0">
      </div>
    </main>
  </div>

  <!-- Conflict Resolution Panel -->
  <div class="slideover-overlay" id="conflict-overlay">
    <div class="slideover" id="conflict-panel">
      <div class="slideover-header">
        <div class="slideover-header-top">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Conflict Review
          </h3>
          <button class="btn-icon" id="conflict-panel-close" style="font-size:1.2rem;line-height:1">&times;</button>
        </div>
        <div class="slideover-meta">
          <span id="conflict-panel-count" style="color:var(--color-text-tertiary);font-size:0.78rem"></span>
          <span style="flex:1"></span>
          <select id="conflict-panel-filter" style="width:auto;font-size:0.78rem;padding:2px 6px">
            <option value="pending">Pending</option>
            <option value="accepted">Accepted</option>
            <option value="rejected">Rejected</option>
            <option value="all">All</option>
          </select>
        </div>
      </div>
      <div class="slideover-body" id="conflict-panel-body">
        <div class="empty-state" style="padding:2rem">Loading conflicts...</div>
      </div>
    </div>
  </div>

  <script src="/js/vendor/jspdf.umd.min.js"></script>
  <script src="/js/vendor/jspdf.plugin.autotable.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/events.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polaris — Assets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Assets</h2>
        <div class="page-header-actions">
          <div class="btn-dropdown-wrap" data-manage-assets>
            <button class="btn btn-secondary" id="btn-import">Import &#9662;</button>
            <div class="btn-dropdown-menu" id="import-menu">
              <button id="btn-import-csv">From CSV</button>
              <button id="btn-import-pdf">From PDF Invoice</button>
            </div>
          </div>
          <div class="btn-dropdown-wrap">
            <button class="btn btn-secondary" id="btn-export">Export &#9662;</button>
            <div class="btn-dropdown-menu" id="export-menu">
              <div class="dropdown-heading">PDF</div>
              <button data-export="page" data-fmt="pdf">Current page</button>
              <button data-export="filtered" data-fmt="pdf">All filtered results</button>
              <button data-export="all" data-fmt="pdf">Entire asset list</button>
              <div class="dropdown-divider"></div>
              <div class="dropdown-heading">CSV</div>
              <button data-export="page" data-fmt="csv">Current page</button>
              <button data-export="filtered" data-fmt="csv">All filtered results</button>
              <button data-export="all" data-fmt="csv">Entire asset list</button>
            </div>
          </div>
          <button class="btn btn-secondary" id="btn-monitoring-settings" data-admin-only title="Manual monitoring tier + class overrides">Monitoring Settings</button>
          <input type="file" id="import-csv-input" accept=".csv" style="display:none">
          <input type="file" id="import-pdf-input" accept=".pdf" style="display:none">
          <button class="btn btn-secondary" id="btn-assets-columns" title="Show or hide columns">Columns &#9662;</button>
          <button class="btn btn-secondary" id="btn-asset-settings" data-admin-only title="Asset settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</button>
          <button class="btn btn-primary" id="btn-add-asset" data-manage-assets>+ Add Asset</button>
        </div>
      </div>

      <div class="filter-bar">
        <label style="margin-left:auto">Show</label>
        <select id="filter-pagesize" style="width:auto">
          <option value="15" selected>15</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>

      <div id="assets-bulk-bar" class="bulk-bar" style="display:none">
        <span class="bulk-bar-count">0 selected</span>
        <button class="btn btn-sm btn-secondary" id="assets-bulk-deselect-btn">Deselect All</button>

        <div class="btn-dropdown-wrap" data-manage-assets style="margin-left:auto">
          <button class="btn btn-sm btn-secondary" id="assets-bulk-type-btn">Type &#9662;</button>
          <div class="btn-dropdown-menu" id="assets-bulk-type-menu"></div>
        </div>

        <div class="btn-dropdown-wrap" data-manage-assets>
          <button class="btn btn-sm btn-secondary" id="assets-bulk-state-btn">State &#9662;</button>
          <div class="btn-dropdown-menu" id="assets-bulk-state-menu"></div>
        </div>

        <div class="btn-dropdown-wrap" data-manage-assets>
          <button class="btn btn-sm btn-secondary" id="assets-bulk-monitor-btn" title="Enable ICMP monitoring on the selected assets. FortiManager-discovered firewalls keep their integration-locked monitoring source.">Monitoring &#9662;</button>
          <div class="btn-dropdown-menu" id="assets-bulk-monitor-menu">
            <button id="assets-bulk-monitor-on">Enable monitoring</button>
            <button id="assets-bulk-monitor-off">Disable monitoring</button>
          </div>
        </div>

        <button class="btn btn-sm btn-secondary" id="assets-bulk-tags-btn" data-manage-assets>Edit Tags</button>

        <button class="btn btn-sm btn-danger" id="assets-bulk-quarantine-btn" data-manage-assets title="Quarantine selected assets — pushes MAC block to FortiGate(s) that have seen each asset" style="display:none">Quarantine selected</button>
        <button class="btn btn-sm btn-secondary" id="assets-bulk-unquarantine-btn" data-manage-assets title="Release quarantine on selected assets" style="display:none">Release Quarantine</button>

        <button class="btn btn-sm btn-danger" id="assets-bulk-delete-btn" data-manage-assets>Delete selected</button>
      </div>

      <div id="pagination-top" style="display:flex;align-items:center;gap:12px;justify-content:center;padding:0.5rem 0 1rem"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="cb-col"><input type="checkbox" id="assets-select-all" title="Select all on this page"></th>
              <th class="fav-col" title="Favorites pin to the top"></th>
              <th data-sf-key="hostname" data-sf-type="string">Hostname</th>
              <th data-sf-key="ipAddress" data-sf-type="ip">IP Address</th>
              <th data-sf-key="serialNumber" data-sf-type="string">Serial Number</th>
              <th data-sf-key="assetType" data-sf-type="string" data-sf-options="server|switch|router|firewall|workstation|printer|access_point=Access Point|other">Type</th>
              <th data-sf-key="status" data-sf-type="string" data-sf-options="active|maintenance|storage|decommissioned|disabled|quarantined">State</th>
              <th data-sf-key="_monitor" data-sf-type="string" data-sf-options="Monitored|Unmonitored|Up|Warning|Recovering|Down">Status</th>
              <th data-sf-key="_server" data-sf-type="string">Server</th>
              <th data-sf-key="lastSeen" data-sf-type="date">Last Seen</th>
              <th data-col-id="actions" data-col-required="true">Actions</th>
            </tr>
          </thead>
          <tbody id="assets-tbody">
            <tr><td colspan="11" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" style="display:flex;align-items:center;gap:12px;justify-content:center;padding:1rem 0"></div>
    </main>
  </div>

  <script src="/js/vendor/jspdf.umd.min.js"></script>
  <script src="/js/vendor/jspdf.plugin.autotable.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/table-sf.js"></script>
  <script src="/js/favorites.js"></script>
  <script src="/js/integrations.js"></script>
  <script src="/js/assets.js"></script>
</body>
</html>

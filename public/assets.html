<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelob — Assets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="/logo.webp">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Assets</h2>
        <div class="page-header-actions">
          <div class="btn-dropdown-wrap">
            <button class="btn btn-secondary" id="btn-export">Export &#9662;</button>
            <div class="btn-dropdown-menu" id="export-menu">
              <div class="dropdown-heading">PDF</div>
              <button data-export="page" data-fmt="pdf">Current page</button>
              <button data-export="filtered" data-fmt="pdf">All filtered results</button>
              <button data-export="all" data-fmt="pdf">Entire asset list</button>
              <div class="dropdown-divider"></div>
              <div class="dropdown-heading">CSV</div>
              <button data-export="page" data-fmt="csv">Current page</button>
              <button data-export="filtered" data-fmt="csv">All filtered results</button>
              <button data-export="all" data-fmt="csv">Entire asset list</button>
            </div>
          </div>
          <button class="btn btn-secondary" id="btn-oui-lookup" data-manage-assets title="OUI manufacturer lookup for all assets with a MAC but no manufacturer">OUI Lookup</button>
          <button class="btn btn-secondary" id="btn-dns-lookup" data-manage-assets title="Reverse DNS lookup for all assets missing a DNS name">DNS Lookup</button>
          <button class="btn btn-primary" id="btn-add-asset" data-manage-assets>+ Add Asset</button>
        </div>
      </div>

      <div class="filter-bar">
        <label>Status</label>
        <select id="filter-status" style="width:auto">
          <option value="hide-decommissioned" selected>Active / Maintenance / Storage</option>
          <option value="">All</option>
          <option value="active">Active</option>
          <option value="maintenance">Maintenance</option>
          <option value="decommissioned">Decommissioned</option>
          <option value="storage">Storage</option>
        </select>
        <label>Type</label>
        <select id="filter-type" style="width:auto">
          <option value="">All</option>
          <option value="server">Server</option>
          <option value="switch">Switch</option>
          <option value="router">Router</option>
          <option value="firewall">Firewall</option>
          <option value="workstation">Workstation</option>
          <option value="printer">Printer</option>
          <option value="access_point">Access Point</option>
          <option value="other">Other</option>
        </select>
        <label>Search</label>
        <input type="text" id="filter-search" placeholder="hostname, IP, MAC, tag..." style="width:200px">
        <label style="margin-left:auto">Show</label>
        <select id="filter-pagesize" style="width:auto">
          <option value="15" selected>15</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Hostname</th>
              <th>IP Address</th>
              <th>MAC Address</th>
              <th>Serial Number</th>
              <th>DNS Name</th>
              <th>Type</th>
              <th>Status</th>
              <th>Location</th>
              <th>Assigned To</th>
              <th>Acquired</th>
              <th style="width:90px">Actions</th>
            </tr>
          </thead>
          <tbody id="assets-tbody">
            <tr><td colspan="11" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" style="display:flex;align-items:center;gap:12px;justify-content:center;padding:1rem 0"></div>
    </main>
  </div>

  <script src="/js/vendor/jspdf.umd.min.js"></script>
  <script src="/js/vendor/jspdf.plugin.autotable.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/assets.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelob — Assets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Assets</h2>
        <div class="page-header-actions">
          <button class="btn btn-primary" id="btn-add-asset" data-admin-only>+ Add Asset</button>
        </div>
      </div>

      <div class="filter-bar">
        <label>Status</label>
        <select id="filter-status" style="width:auto">
          <option value="">All</option>
          <option value="active">Active</option>
          <option value="maintenance">Maintenance</option>
          <option value="decommissioned">Decommissioned</option>
          <option value="storage">Storage</option>
        </select>
        <label>Type</label>
        <select id="filter-type" style="width:auto">
          <option value="">All</option>
          <option value="server">Server</option>
          <option value="switch">Switch</option>
          <option value="router">Router</option>
          <option value="firewall">Firewall</option>
          <option value="workstation">Workstation</option>
          <option value="printer">Printer</option>
          <option value="access_point">Access Point</option>
          <option value="other">Other</option>
        </select>
        <label>Search</label>
        <input type="text" id="filter-search" placeholder="hostname, IP, MAC, tag..." style="width:200px">
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Hostname</th>
              <th>IP Address</th>
              <th>MAC Address</th>
              <th>DNS Name</th>
              <th>Type</th>
              <th>Status</th>
              <th>Location</th>
              <th>Assigned To</th>
              <th>Acquired</th>
              <th style="width:90px">Actions</th>
            </tr>
          </thead>
          <tbody id="assets-tbody">
            <tr><td colspan="10" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/assets.js"></script>
</body>
</html>

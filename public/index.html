<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polaris — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Dashboard</h2>
        <div class="page-header-actions">
          <button type="button" id="dashboard-add-widget" class="btn btn-primary">+ Widget</button>
        </div>
      </div>

      <div id="dashboard-empty-state" class="dashboard-empty">
        Use the + Widget button to get started
      </div>
      <div id="dashboard-canvas" class="dashboard-canvas" hidden></div>
    </main>
  </div>

  <div class="slideover-overlay" id="widget-library-overlay" aria-hidden="true">
    <aside class="slideover" id="widget-library-panel" role="dialog" aria-labelledby="widget-library-title">
      <div class="slideover-resize-handle"></div>
      <div class="slideover-header">
        <div class="slideover-header-top">
          <h3 id="widget-library-title">Add a Widget</h3>
          <button type="button" class="btn btn-icon slideover-close" id="widget-library-close" aria-label="Close">&times;</button>
        </div>
        <p class="slideover-meta">Drag a widget onto the dashboard, or click to add it at the next open slot.</p>
      </div>
      <div class="slideover-body" id="widget-library-body"></div>
    </aside>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/widgets/index.js"></script>
  <script src="/js/widgets/monitorAlerts.js"></script>
  <script src="/js/widgets/recentReservations.js"></script>
  <script src="/js/widgets/assetTypes.js"></script>
  <script src="/js/widgets/blockUtilization.js"></script>
  <script src="/js/widgets/staleReservations.js"></script>
  <script src="/js/widgets/capacityHealth.js"></script>
  <script src="/js/widgets/discoveryActivity.js"></script>
  <script src="/js/widgets/conflictQueue.js"></script>
  <script src="/js/widgets/recentEvents.js"></script>
  <script src="/js/widget-library.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>

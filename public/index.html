<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polaris — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header"><h2>Dashboard</h2></div>

      <div class="dashboard-grid">
        <div class="card dashboard-card" id="card-monitor-alerts">
          <p class="card-title">Monitor alerts</p>
          <div id="monitor-alerts"></div>
        </div>
        <div class="card dashboard-card" id="card-recent-reservations">
          <p class="card-title">Recently reserved</p>
          <div id="recent-reservations"></div>
        </div>
        <div class="card dashboard-card" id="card-asset-types">
          <p class="card-title">Assets by type</p>
          <div id="asset-types"></div>
        </div>
        <div class="card dashboard-card" id="card-block-util">
          <p class="card-title">Block utilization</p>
          <div id="block-util"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
